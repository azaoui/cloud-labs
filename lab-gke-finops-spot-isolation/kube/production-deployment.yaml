apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-app
  namespace: production
  labels:
    app: critical-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: critical-app
  template:
    metadata:
      labels:
        app: critical-app
    spec:
      nodeSelector:
        workload_tier: on-demand
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi